<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8DC63F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B4EF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoBlueBg" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00B4EF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088BB;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle for PWA icon -->
  <circle cx="96" cy="96" r="96" fill="#080D1A"/>

  <!-- Green swoosh -->
  <path d="M 40 50 Q 90 30 140 70 Q 120 100 80 90 Q 60 85 40 50 Z" fill="url(#logoGradient)" opacity="0.95"/>

  <!-- Blue bottom swoosh -->
  <path d="M 50 120 Q 100 140 150 110 Q 130 90 90 100 Q 70 105 50 120 Z" fill="url(#logoBlueBg)" opacity="0.95"/>

  <!-- Center highlight for depth -->
  <circle cx="96" cy="96" r="35" fill="none" stroke="url(#logoGradient)" stroke-width="2" opacity="0.6"/>
</svg>
